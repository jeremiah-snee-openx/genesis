<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 628" width="1200" height="628"
     role="img"
     aria-label="genesis -- a design discipline for agentic primitives. Install with npx skills add danielmeppiel/genesis. 6 agent primitives, 9 architectural patterns, 23 design patterns, 4 refactor patterns.">
  <title>genesis launch hero</title>

  <rect width="1200" height="628" fill="#fcfcf6"/>

  <!-- TOP : identity + tagline -->

  <g transform="translate(80, 56)">
    <rect width="72" height="72" rx="14" fill="#000000"/>
    <text x="36" y="56"
          text-anchor="middle"
          font-family="Georgia, 'Times New Roman', serif"
          font-weight="700"
          font-size="58"
          fill="#daf172">G</text>
  </g>

  <text x="172" y="106"
        font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-weight="700"
        font-size="34"
        fill="#0d1117">genesis-skill</text>

  <text x="80" y="194"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="700"
        font-size="38"
        fill="#0d1117">Markdown that steers an LLM is code.</text>
  <text x="80" y="240"
        font-family="Georgia, 'Times New Roman', serif"
        font-weight="400"
        font-size="36"
        fill="#0d1117" opacity="0.62">Design it before you write it.</text>

  <!-- CENTER : install panel -->

  <rect x="80" y="280" width="1040" height="84" rx="10" fill="#0d1117"/>
  <text x="112" y="333"
        font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-weight="700"
        font-size="30"
        fill="#daf172">$</text>
  <text x="142" y="333"
        font-family="Menlo, 'SF Mono', Consolas, monospace"
        font-weight="700"
        font-size="30"
        fill="#fcfcf6">npx skills add danielmeppiel/genesis</text>

  <!-- chartreuse brand whisper under install panel -->
  <rect x="1080" y="370" width="40" height="3" fill="#daf172"/>

  <!-- BOTTOM : 4-column stat block (no header, no descriptors) -->
  <!-- column centers at x = 210, 470, 730, 990 -->

  <!-- numbers : Georgia serif, large, baseline y=500 -->
  <text x="210" y="500" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="86"
        fill="#0d1117">6</text>
  <text x="470" y="500" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="86"
        fill="#0d1117">9</text>
  <text x="730" y="500" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="86"
        fill="#0d1117">23</text>
  <text x="990" y="500" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="86"
        fill="#0d1117">4</text>

  <!-- names : monospace bold, two lines per column -->
  <!-- col 1 : agent primitives -->
  <text x="210" y="554" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">agent</text>
  <text x="210" y="584" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">primitives</text>

  <!-- col 2 : architectural patterns -->
  <text x="470" y="554" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">architectural</text>
  <text x="470" y="584" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">patterns</text>

  <!-- col 3 : design patterns -->
  <text x="730" y="554" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">design</text>
  <text x="730" y="584" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">patterns</text>

  <!-- col 4 : refactor patterns -->
  <text x="990" y="554" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">refactor</text>
  <text x="990" y="584" text-anchor="middle"
        font-family="Menlo, 'SF Mono', Consolas, monospace" font-weight="700" font-size="22"
        fill="#0d1117">patterns</text>

</svg>
